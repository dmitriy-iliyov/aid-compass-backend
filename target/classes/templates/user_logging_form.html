<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
<!--    <link rel="stylesheet" href="/static/css/user_forms_styles.css">-->
    <link rel="stylesheet" href="/css/user_forms_styles.css">
</head>
<body>
<form th:method="POST" th:action="@{/user/login}">
    <p>
        Logging in TipTap
    </p>
    <label>
        <input type="email" field="*{email}" name="email" placeholder="Enter your email"/>
    </label>
    <label>
        <input type="password" field="*{password}" name="password" placeholder="Enter your password"/>
    </label>
    <button type="submit">Login</button>
</form>
</body>
</html>
