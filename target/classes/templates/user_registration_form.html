<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>User Registration</title>
<!--    <link rel="stylesheet" href="/static/css/user_forms_styles.css">-->
    <link rel="stylesheet" href="/css/user_forms_styles.css">
</head>
<body>
<form th:method="POST" th:action="@{/user/registration}" th:object="${user}">
    <p>
        Creating TipTap account
    </p>
    <label>
        <input type="email" field="*{email}" name="email" placeholder="Enter your email"/>
    </label>
    <label>
        <input type="password" field="*{password}" name="password" placeholder="Enter your password"/>
    </label>
    <button type="submit">Submit</button>
</form>
</body>
</html>
