version: "3.8"

services:

  db:
    image: postgres:16.1-alpine3.19
    networks:
      - default
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: admin
      POSTGRES_DB: user-db
    ports:
      - "5432:5432"

  cache:
    image: redis
    networks:
      - default
      #      environment:
      #        REDIS_PASSWORD: redisroot
    ports:
      - "6379:6379"
  #      command: ["redis-server", "--requirepass", "redisroot"]