spring.application.name=message-service

# ssl
server.port=8443
server.ssl.key-store=classpath:/ssl/springboot_keystore.p12
server.ssl.key-store-password=password
server.ssl.key-password=password

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redisroot

# company mail
spring.mail.username=
spring.mail.password=

# auth service
aid.compass.api.auth.url=https://localhost:8443/api/users

# ttl confirm token and cached unconf user
aid.compass.api.confirm.email.url=https://localhost:8443/api/users/confirm/email?token=
aid.compass.api.confirm.ttl.secs=300

# ttl pass recovery token
aid.compass.api.password.recovery.email.url=https://localhost:8443/api/users/recover-password/?token=
aid.compass.api.password.recovery.ttl.secs=300